services:
  homepage:
    image: 'ghcr.io/gethomepage/homepage:latest'
    container_name: homepage
    restart: unless-stopped
    expose:
      - '3000'
    volumes:
      - 'homepage-config:/app/config'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    environment:
      - TZ=Asia/Jakarta
      - PUID=1000
      - PGID=1000
      - 'HOMEPAGE_ALLOWED_HOSTS=https://your.domain.'
    healthcheck:
      test:
        - CMD
        - wget
        - '--spider'
        - '-q'
        - 'http://localhost:3000'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
volumes:
  homepage-config: null

